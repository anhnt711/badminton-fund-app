<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quỹ đội cầu lông</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar public-topbar">
        <div class="brand">
          <img src="/assets/court-mark.svg" alt="" />
          <div class="brand-copy">
            <h1>Quỹ đội cầu lông</h1>
          </div>
        </div>
        <div class="month-tools" aria-label="chọn tháng xem quỹ">
          <div class="field">
            <label for="month">tháng</label>
            <input id="month" type="month" />
          </div>
          <button id="reload" class="secondary" type="button">tải lại</button>
        </div>
      </header>

      <div id="dashboard"></div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
