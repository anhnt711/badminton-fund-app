<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kế toán đội cầu lông</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img src="/assets/court-mark.svg" alt="" />
          <div>
            <h1>Kế toán đội</h1>
            <p>Nhập khoản thu, chi, đóng tiền và chi phí phát sinh</p>
          </div>
        </div>
        <nav class="nav">
          <a href="/">Dashboard</a>
          <a href="/admin">Trang quản trị</a>
          <a href="/admin/categories">Hạng mục tiền</a>
        </nav>
      </header>

      <section id="accounting-guard" class="notice" hidden>
        Bạn chưa đăng nhập quản trị. <a href="/admin">Đăng nhập tại đây</a> rồi quay lại trang này.
      </section>

      <form id="accounting-form" class="grid two-col" style="margin-top:12px">
        <section class="panel">
          <div class="panel-header"><h2>Nhập thu chi</h2></div>
          <div class="panel-body form-grid">
            <div id="accountant-key-field" class="field full" hidden>
              <label for="accountant-key">Mật khẩu quản trị</label>
              <input id="accountant-key" type="password" autocomplete="off" />
            </div>
            <div id="accountant-key-status" class="notice compact full" hidden>
              Đã đăng nhập quản trị trên máy này.
              <button id="change-accountant-key" type="button">Đăng xuất</button>
            </div>
            <div class="field">
              <label for="tx-date">Ngày</label>
              <input id="tx-date" name="date" type="date" required />
            </div>
            <div class="field">
              <label for="tx-type">Loại</label>
              <select id="tx-type" name="type" required>
                <option value="Thu">Thu</option>
                <option value="Chi">Chi</option>
              </select>
            </div>
            <div class="field">
              <label for="tx-member">Thành viên</label>
              <input id="tx-member" name="member" placeholder="Tên hoặc mã, bỏ trống nếu là khoản chi chung" />
            </div>
            <div class="field">
              <label for="tx-category">Hạng mục</label>
              <select id="tx-category" name="categoryId" required></select>
            </div>
            <div class="field full">
              <label for="tx-category-custom">Nội dung khác</label>
              <input id="tx-category-custom" name="category" placeholder="Chỉ nhập khi chọn hạng mục Khác" />
            </div>
            <div class="field">
              <label for="tx-amount">Số tiền</label>
              <input id="tx-amount" name="amount" type="number" min="1" step="1000" required />
            </div>
            <div class="field full">
              <label for="tx-note">Ghi chú</label>
              <input id="tx-note" name="note" />
            </div>
            <div class="full">
              <button class="primary" type="submit">Lưu thu chi</button>
            </div>
          </div>
        </section>
        <section class="panel">
          <div class="panel-header"><h2>Kết quả</h2></div>
          <div class="panel-body">
            <div id="result" class="result">Chưa có dữ liệu.</div>
          </div>
        </section>
        <section class="panel" style="grid-column:1 / -1">
          <div class="panel-header">
            <h2>Hạng mục đang dùng</h2>
            <a class="link-button" href="/admin/categories">Sửa hạng mục</a>
          </div>
          <div id="accounting-categories" class="table-wrap"></div>
        </section>
      </form>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
